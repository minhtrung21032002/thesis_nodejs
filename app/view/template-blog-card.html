<a href="/blog?id={%ID%}" class="col-md-4">
    <figure class="blog-card">
        <div class="img-wrapper">
            <img src="{%IMAGE%}" onerror="this.src='../images/fallback-blog-image.jpg';" class="blog-card-image" />
        </div>
        <div class="blog-card-content">
            <h3 class="blog-card-title">{%BLOGTITLE%}</h3>
        </div>
    </figure>
</a>
